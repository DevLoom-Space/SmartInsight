{% extends "base.html" %}
{% block title %}Favorites | SmartInsight{% endblock %}

{% block content %}
<div class="bg-white rounded-4 shadow-sm p-4">
  <div class="d-flex justify-content-between align-items-center">
    <h3 class="fw-bold mb-0">Favorites</h3>
    <a href="{% url 'dashboard_home' %}" class="text-decoration-none">← Back</a>
  </div>

  <div class="mt-4 d-grid gap-2">
    {% for q in quotes %}
      <div class="p-3 border rounded-3">
        <div>“{{ q.quote }}”</div>
        <div class="text-muted mt-1">— {{ q.author }}</div>
      </div>
    {% empty %}
      <div class="text-muted">No favorites yet.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
