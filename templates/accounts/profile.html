{% extends "base.html" %}
{% block title %}Profile | SmartInsight{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="bg-white rounded-4 shadow-sm p-4">
      <div class="d-flex justify-content-between align-items-center">
        <h3 class="fw-bold mb-0">Profile</h3>
        <a href="{% url 'dashboard_home' %}" class="text-decoration-none">← Back</a>
      </div>

      <form method="post" class="mt-4 d-grid gap-3">
        {% csrf_token %}
        {{ form.city.label_tag }} {{ form.city }}
        {{ form.zodiac.label_tag }} {{ form.zodiac }}
        <button class="btn btn-dark btn-lg">Save</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
