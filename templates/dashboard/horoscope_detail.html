{% extends "base.html" %}
{% block title %}Horoscope | SmartInsight{% endblock %}

{% block content %}
<div class="bg-white rounded-4 shadow-sm p-4">
  <div class="d-flex justify-content-between align-items-center">
    <h3 class="fw-bold mb-0">Horoscope</h3>
    <a href="{% url 'dashboard_home' %}" class="text-decoration-none">← Back</a>
  </div>

  <form class="mt-3 d-flex gap-2" method="get">
    <select class="form-select" name="zodiac">
      {% for z in zodiac_choices %}
        <option value="{{ z }}" {% if z == zodiac %}selected{% endif %}>{{ z|title }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-dark">Load</button>
  </form>

  <div class="mt-4">
    {% if error %}
      <div class="text-danger">{{ error }}</div>
    {% elif data %}
      <div class="fs-5 text-muted">{{ zodiac|title }}</div>
      <div class="mt-2">{{ data.horoscope }}</div>
    {% endif %}
  </div>
</div>
{% endblock %}
