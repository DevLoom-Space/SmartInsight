<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Smart Daily Insight{% endblock %}</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      /* ---------- Global polish ---------- */
      body { background: #f6f7fb; }
      .shadow-soft { box-shadow: 0 12px 30px rgba(16, 24, 40, .08); }
      .card-soft { border: 1px solid rgba(0,0,0,.06); }
      .lift { transition: transform .18s ease, box-shadow .18s ease; }
      .lift:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(16,24,40,.10); }

      /* ---------- Weather hero backgrounds ---------- */
      .weather-hero{
        background: linear-gradient(135deg, #f7f8ff, #fff7ef);
        border: 1px solid rgba(0,0,0,.06);
        min-height: 280px;
      }
      .weather-hero.is-sunny{
        background: linear-gradient(135deg, #fff2b8, #e7f5ff);
      }
      .weather-hero.is-cloudy{
        background: linear-gradient(135deg, #eef2ff, #f3f5f7);
      }
      .weather-hero.is-mild{
        background: linear-gradient(135deg, #eff9ff, #fff6f1);
      }
      .weather-hero.is-rainy{
        background: linear-gradient(135deg, #e7eefc, #eef3ff);
      }

      /* ---------- Scene layer ---------- */
      .wx-scene{
        position:absolute;
        inset:0;
        overflow:hidden;
        pointer-events:none;
        opacity:.95;
        z-index:1;
      }

      /* ---------- Sun ---------- */
      .wx-sun{
        position:absolute;
        width:120px;
        height:120px;
        border-radius:999px;
        top:24px;
        right:120px;
        background: radial-gradient(circle at 30% 30%, #fff6b8, #ffcc33);
        box-shadow: 0 0 40px rgba(255, 204, 51, .55);
        animation: sunPulse 4s ease-in-out infinite;
        opacity: .95;
      }
      @keyframes sunPulse{
        0%,100%{ transform: scale(1); }
        50%{ transform: scale(1.04); }
      }

      /* ---------- Clouds ---------- */
      .wx-cloud{
        position:absolute;
        width:240px;
        height:70px;
        border-radius:999px;
        background: rgba(255,255,255,.9);
        filter: blur(.2px);
        box-shadow: 0 12px 30px rgba(0,0,0,.06);
      }
      .wx-cloud::before, .wx-cloud::after{
        content:"";
        position:absolute;
        background: rgba(255,255,255,.95);
        border-radius:999px;
      }
      .wx-cloud::before{ width:90px; height:90px; left:30px; top:-40px; }
      .wx-cloud::after{ width:110px; height:110px; left:100px; top:-55px; }

      .wx-cloud-1{ top:55px; left:-260px; animation: drift1 28s linear infinite; }
      .wx-cloud-2{ top:125px; left:-300px; transform: scale(.85); opacity:.85; animation: drift2 34s linear infinite; }
      .wx-cloud-3{ top:22px; left:-280px; transform: scale(.72); opacity:.75; animation: drift3 40s linear infinite; }

      @keyframes drift1{ from{ transform: translateX(0); } to{ transform: translateX(1600px); } }
      @keyframes drift2{ from{ transform: translateX(0) scale(.85); } to{ transform: translateX(1700px) scale(.85); } }
      @keyframes drift3{ from{ transform: translateX(0) scale(.72); } to{ transform: translateX(1500px) scale(.72); } }

      /* ---------- Rain ---------- */
      .wx-rain{
        position:absolute;
        inset:0;
        opacity:0; /* default hidden */
      }
      .wx-rain .drop{
        position:absolute;
        width:2px;
        height:18px;
        background: rgba(90,140,255,.55);
        border-radius: 10px;
        top:-30px;
        left: calc(5% + (90% * var(--i)));
        animation: rainFall 1.2s linear infinite;
        animation-delay: calc(-1.2s * var(--d));
      }
      @keyframes rainFall{
        from{ transform: translateY(0); opacity:.0; }
        10%{ opacity:1; }
        to{ transform: translateY(420px); opacity:0; }
      }

      /* ---------- Mode logic ---------- */
      .weather-hero.is-sunny .wx-rain{ opacity:0; }
      .weather-hero.is-cloudy .wx-sun{ opacity:.35; }
      .weather-hero.is-cloudy .wx-rain{ opacity:0; }
      .weather-hero.is-mild .wx-rain{ opacity:0; }

      .weather-hero.is-rainy .wx-rain{ opacity:1; }
      .weather-hero.is-rainy .wx-sun{ opacity:.15; }
      .weather-hero.is-rainy .wx-cloud{ opacity:.98; }

      /* ---------- Quote styling ---------- */
      .quote-card{ position:relative; padding-left:24px; }
      .quote-mark{
        position:absolute;
        left:0;
        top:-12px;
        font-size:52px;
        line-height:1;
        opacity:.14;
      }

      /* ---------- Micro polish ---------- */
      .badge-glass{
        background: rgba(255,255,255,.65);
        border: 1px solid rgba(0,0,0,.08);
        backdrop-filter: blur(6px);
      }

      @media(max-width: 576px){
        .wx-sun{ right:20px; width:90px; height:90px; }
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".wx-rain .drop").forEach((d, idx) => {
          d.style.setProperty("--i", (idx % 20) / 20);
          d.style.setProperty("--d", (idx % 7) / 7);
        });
      });
    </script>

    {% block extra_css %}{% endblock %}
  </head>

  <body class="bg-light">
    {% include "partials/navbar.html" %}

    <main class="container py-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} shadow-sm" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
